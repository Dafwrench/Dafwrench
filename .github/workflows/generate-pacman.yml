name: Generate Pacman contribution graph

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate Pacman contribution graph
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: Dafwrench
          games: pacman
          player_style: opportunistic

      - name: Publish generated SVGs
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
